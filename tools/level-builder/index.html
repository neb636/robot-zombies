<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silicon Requiem — Level Builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a1e;
      --surface: #12122a;
      --surface2: #1a1a36;
      --border: #2a2a4a;
      --accent: #7af8ff;
      --accent2: #b07af0;
      --text: #d0d0e8;
      --text-dim: #7070a0;
      --success: #4af0a0;
      --error: #f07070;
      --warn: #f0c040;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 13px;
      color: var(--accent);
      white-space: nowrap;
      letter-spacing: 1px;
    }

    #prompt-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      font-family: inherit;
      font-size: 12px;
      border-radius: 3px;
      outline: none;
    }
    #prompt-input:focus { border-color: var(--accent); }
    #prompt-input::placeholder { color: var(--text-dim); }

    #generate-btn {
      background: var(--accent2);
      color: #fff;
      border: none;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }
    #generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #generate-btn:hover:not(:disabled) { background: #c090ff; }

    #generate-spinner { display: none; color: var(--accent); }

    /* ── Variation tabs ── */
    #variation-tabs {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 2px;
      padding: 4px 8px 0;
      flex-shrink: 0;
    }

    .tab-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      color: var(--text-dim);
      padding: 5px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px 3px 0 0;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tab-btn.active { background: var(--bg); color: var(--accent); border-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Main layout ── */
    .main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Canvas area ── */
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0d0d20;
      position: relative;
    }

    #canvas-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      gap: 12px;
    }
    #canvas-placeholder .hint {
      font-size: 11px;
      max-width: 380px;
      text-align: center;
      line-height: 1.6;
    }

    #main-canvas {
      display: none;
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: crosshair;
      image-rendering: pixelated;
    }

    /* ── Right sidebar ── */
    .right-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      border-bottom: 1px solid var(--border);
      padding: 8px;
    }

    .sidebar-section h2 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    /* Selected panel */
    #selected-panel { display: none; }

    .field-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .field-row label {
      color: var(--text-dim);
      width: 40px;
      flex-shrink: 0;
      font-size: 11px;
    }
    .field-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 6px;
      font-family: inherit;
      font-size: 11px;
      border-radius: 2px;
      outline: none;
      min-width: 0;
    }
    .field-row input:focus { border-color: var(--accent); }

    #selected-path {
      font-size: 10px;
      color: var(--text-dim);
      word-break: break-all;
      margin-top: 4px;
      cursor: help;
    }

    #delete-btn {
      margin-top: 6px;
      background: transparent;
      border: 1px solid var(--error);
      color: var(--error);
      padding: 3px 8px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      border-radius: 2px;
      width: 100%;
    }
    #delete-btn:hover { background: rgba(240,112,112,0.1); }

    /* Export button */
    #export-btn {
      margin: 8px;
      background: transparent;
      border: 1px solid var(--success);
      color: var(--success);
      padding: 6px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      border-radius: 2px;
      letter-spacing: 0.5px;
    }
    #export-btn:hover { background: rgba(74,240,160,0.1); }

    /* ── Palette ── */
    .palette-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .palette-controls {
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .palette-controls select,
    .palette-controls input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 6px;
      font-family: inherit;
      font-size: 11px;
      border-radius: 2px;
      outline: none;
    }
    .palette-controls select:focus,
    .palette-controls input:focus { border-color: var(--accent); }

    #palette-grid {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-content: flex-start;
    }

    .palette-item {
      width: 52px;
      height: 52px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }
    .palette-item:hover { border-color: var(--accent2); }
    .palette-item.pending { border-color: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .palette-item img { image-rendering: pixelated; }

    /* ── Status bar ── */
    .status-bar {
      background: var(--surface2);
      border-top: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 11px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-info { color: var(--text-dim); }
    .status-success { color: var(--success); }
    .status-error { color: var(--error); }

    #warnings-panel {
      display: none;
      background: rgba(240,192,64,0.1);
      border-top: 1px solid var(--warn);
      padding: 4px 10px;
      font-size: 11px;
      color: var(--warn);
      flex-shrink: 0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <h1>LEVEL BUILDER</h1>
  <input id="prompt-input" type="text"
    placeholder="Describe the room... e.g. a corporate office with cubicles, a cafeteria, and hallways"
  />
  <button id="generate-btn">Generate</button>
  <span id="generate-spinner">⟳</span>
</header>

<!-- Variation tabs -->
<div id="variation-tabs"></div>

<!-- Main area -->
<div class="main-area">

  <!-- Canvas -->
  <div class="canvas-area">
    <div id="canvas-placeholder">
      <div style="font-size:32px; color: #2a2a4a;">◈</div>
      <div class="hint">
        Enter a room description above and click <strong style="color:#b07af0">Generate</strong>
        to create 3 isometric level variations using your asset library.
      </div>
      <div class="hint" style="font-size:10px;">
        Tip: Be specific — "a small office with 3 desks, chairs, and a whiteboard near the door"
      </div>
    </div>
    <canvas id="main-canvas"></canvas>
  </div>

  <!-- Right sidebar -->
  <div class="right-sidebar">

    <!-- Selected object -->
    <div class="sidebar-section" id="selected-panel">
      <h2>Selected Object</h2>
      <div class="field-row">
        <label>Label</label>
        <input id="selected-label" type="text" placeholder="e.g. desk" />
      </div>
      <div class="field-row">
        <label>X</label>
        <input id="selected-x" type="number" />
      </div>
      <div class="field-row">
        <label>Y</label>
        <input id="selected-y" type="number" />
      </div>
      <div id="selected-path" title=""></div>
      <button id="delete-btn">Delete Object</button>
    </div>

    <!-- Export -->
    <div class="sidebar-section">
      <button id="export-btn">Export Active Layout →</button>
    </div>

    <!-- Asset palette -->
    <div class="palette-section">
      <div class="palette-controls">
        <select id="palette-filter">
          <option value="all">All types</option>
          <option value="furniture">Furniture</option>
          <option value="fixture">Fixture</option>
          <option value="decoration">Decoration</option>
          <option value="platform">Platform (doors/windows)</option>
          <option value="tile">Tile / Floor</option>
          <option value="background">Background</option>
        </select>
        <input id="palette-search" type="text" placeholder="Search assets..." />
      </div>
      <div id="palette-grid"></div>
    </div>

  </div>
</div>

<!-- Status bar -->
<div id="warnings-panel"></div>
<div id="status-bar" class="status-bar status-info">Loading asset catalog...</div>

<script type="module" src="/editor.js"></script>
</body>
</html>
